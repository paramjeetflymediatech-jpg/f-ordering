<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fly-POS Cloud Printer Agent</title>
  <style>
    :root {
      --bg: #090d16;
      --card: #111827;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #ea580c;
      --primary-hover: #f97316;
      --border: #1f2937;
      --green: #10b981;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    .container {
      padding: 24px;
      max-width: 450px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    h1 {
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 11px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      border: 1px dashed var(--border);
      margin-bottom: 16px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 4px;
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-weight: bold;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      box-sizing: border-box;
      outline: none;
      font-size: 12px;
    }

    input:focus, select:focus {
      border-color: var(--primary);
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .col {
      flex: 1;
    }

    .checkbox-group {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      text-transform: none;
      cursor: pointer;
    }

    .checkbox-label input {
      width: auto;
      cursor: pointer;
    }

    button {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .job-log {
      max-height: 120px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
    }

    .job-entry {
      border-bottom: 1px solid var(--border);
      padding: 4px 0;
      display: flex;
      justify-content: space-between;
    }

    .job-entry:last-child {
      border-bottom: none;
    }

    .success-alert {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--green);
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 12px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖨️ Fly-POS Printer Agent</h1>
    <div class="subtitle">Cloud printing system for multi-tenant retail outlets</div>

    <div class="status-bar">
      <span>Status Status:</span>
      <span id="status-label" style="font-weight: bold; display: flex; align-items: center;">
        <span id="status-dot" class="status-dot"></span>
        Offline (Configure keys)
      </span>
    </div>

    <div class="success-alert" id="success-banner">Settings saved successfully!</div>

    <div class="card">
      <form id="config-form">
        <div class="form-group">
          <label>Cloud Server URL</label>
          <input type="url" id="serverUrl" value="http://localhost:3000" placeholder="e.g. https://pos.fly-pos.com" required>
        </div>

        <div class="form-group">
          <label>Secure Print API Token *</label>
          <input type="password" id="apiKey" placeholder="prn_xxxxxxxxx" required>
        </div>

        <button type="submit" style="margin-top: 16px;">Save & Connect Agent</button>
      </form>
      <button class="btn-secondary" id="btn-test">Send Local Test Print</button>
    </div>

    <div class="card">
      <label>Recent Dispatch Print Logs</label>
      <div class="job-log" id="job-log">
        <div style="color: var(--text-muted); font-style: italic; text-align: center; padding-top: 10px;">Waiting for new jobs...</div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
